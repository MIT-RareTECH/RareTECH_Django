{% extends 'base.html' %}

{% block title %}削除の確認{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">削除の確認</div>
      <div class="card-body">
        <p>「<strong>{{ book.title }}</strong>」を削除しますか？この操作は元に戻せません。</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">削除する</button>
            <a href="{% url 'books:book_detail' pk=book.pk %}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
